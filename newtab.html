<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="yale.png">
</head>
<body>
    <div class="container">
        <!-- Calendar and Countdown Bar -->
        <div class="calendar-bar">
            <button id="trackerToggleBtn" class="panel-toggle-btn" title="Toggle Progress Tracker">⊞</button>
            <div class="countdown-section">
                <h3 id="countdownTitle">Days until Target Date</h3>
                <div class="countdown-display">
                    <div class="countdown-number">
                        <span id="daysCount">--</span>
                        <label>Days</label>
                    </div>
                    <div class="countdown-number">
                        <span id="hoursCount">--</span>
                        <label>Hours</label>
                    </div>
                    <div class="countdown-number">
                        <span id="minutesCount">--</span>
                        <label>Minutes</label>
                    </div>
                    <div class="countdown-number">
                        <span id="secondsCount">--</span>
                        <label>Seconds</label>
                    </div>
                </div>
                <button id="setDateBtn" class="set-date-btn">Set Target Date</button>

                <!-- Progress Bar -->
                <div class="progress-bar-section">
                    <div class="progress-bar-label">
                        <span id="progressBarTitle">Progress</span>
                        <span id="progressBarPct">0%</span>
                    </div>
                    <div class="progress-bar-track" id="progressBarTrack" title="Click to set progress">
                        <div class="progress-bar-fill" id="progressBarFill" style="width: 0%"></div>
                    </div>
                    <div class="progress-bar-input-wrap" id="progressInputWrap" style="display: none;">
                        <input type="number" class="progress-bar-input" id="progressBarInput" min="0" max="100" placeholder="0–100" />
                        <button class="progress-bar-set-btn" id="progressBarSetBtn">Set</button>
                    </div>
                </div>
            </div>
            
            <div class="next-event-section">
                <h3>Next Calendar Events</h3>
                <div id="nextEvent" class="next-event">
                    <div class="event-placeholder">
                        <button id="connectCalendarBtn" class="connect-btn">Connect Google Calendar</button>
                    </div>
                </div>
            </div>

            <div class="progress-tracker-panel" id="progressTrackerPanel" style="display: none;">
                <div class="tracker-box" data-index="0"><span class="tracker-box-label">Widget 1</span></div>
                <div class="tracker-box" data-index="1"><span class="tracker-box-label">Widget 2</span></div>
                <div class="tracker-box" data-index="2"><span class="tracker-box-label">Widget 3</span></div>
                <div class="tracker-box" data-index="3"><span class="tracker-box-label">Widget 4</span></div>
            </div>
        </div>

        <!-- Google Tasks Section -->
        <div class="tasks-section">
            <h3>My Tasks</h3>
            <div id="tasksContainer" class="tasks-container">
                <div class="tasks-placeholder">
                    <span>Connect your calendar to view tasks</span>
                </div>
            </div>
            <div class="add-task-row" id="addTaskRow" style="display: none;">
                <input type="text" id="addTaskInput" class="add-task-input" placeholder="Add a task..." maxlength="200" />
                <button id="addTaskBtn" class="add-task-btn">+</button>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>Loading AI & Tech News...</p>
        </div>
        
        <div id="error" class="error hidden">
            <h2>Unable to load Tech Content</h2>
            <p id="errorMessage">There was an error fetching the news and blog feeds.</p>
            <button id="retryBtn" class="retry-btn">Try Again</button>
        </div>
        
        <main id="newsContainer" class="news-container hidden">
            <!-- News articles will be dynamically loaded here -->
        </main>
    </div>
    
    <script type="module" src="script.js"></script>
</body>
</html>
